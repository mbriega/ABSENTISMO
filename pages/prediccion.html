<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Predicciones — ThirdWish Intelligence</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <style>
    *{box-sizing:border-box;}
    .pred-card{background:white;border:1px solid #e2e8f0;border-radius:14px;padding:20px 24px;display:flex;align-items:flex-start;gap:0;margin-bottom:12px;}
    .pred-card:last-child{margin-bottom:0;}
    .pred-left{display:flex;flex-direction:column;align-items:center;width:76px;flex-shrink:0;padding-right:20px;}
    .rank-badge{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:white;margin-bottom:6px;}
    .pred-riesgo-num{font-size:22px;font-weight:800;line-height:1;}
    .pred-riesgo-lbl{font-size:10px;color:#94a3b8;margin-top:2px;}
    .pred-mid{flex:1;min-width:0;padding-right:24px;}
    .pred-title-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
    .pred-centro-name{font-size:15px;font-weight:700;color:#0f172a;}
    .tag-riesgo{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap;}
    .tag-conf{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;}
    .conf-alta{background:#dcfce7;color:#166534;}
    .conf-media{background:#fef9c3;color:#854d0e;}
    .conf-baja{background:#fff1f2;color:#be123c;}
    .pred-meta{font-size:11px;color:#94a3b8;margin-bottom:6px;}
    .pred-desc{font-size:12px;color:#475569;line-height:1.5;}
    .pred-right{flex-shrink:0;width:220px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:12px;}
    .pred-impacto{font-size:12px;color:#475569;text-align:right;line-height:1.5;}
    .btn-entrar{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;}
    .btn-entrar:hover{background:#dbeafe;}
    .kpi-card{background:white;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:18px 20px;}
  </style>
</head>
<body data-page="prediccion" class="bg-surface-50 text-surface-900 antialiased">

  <div id="sidebar-mount"></div>

  <div style="margin-left:260px;min-height:100vh;background:#f8fafc;max-width:calc(100vw - 260px);overflow-x:hidden;">

    <!-- Header -->
    <div style="background:white;border-bottom:1px solid #e2e8f0;padding:16px 24px;position:sticky;top:0;z-index:10;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <h1 style="font-size:15px;font-weight:700;color:#0f172a;margin:0;">Modelos Predictivos</h1>
          <p style="font-size:11px;color:#94a3b8;margin:3px 0 0;">Prediccion de riesgo de absentismo &middot; Actualizado jun 2025</p>
        </div>
        <div style="display:flex;gap:8px;">
          <button style="font-size:12px;color:#64748b;border:1px solid #e2e8f0;background:white;padding:6px 14px;border-radius:8px;cursor:pointer;">Exportar</button>
          <button style="font-size:12px;color:white;background:#2563eb;padding:6px 14px;border-radius:8px;cursor:pointer;border:none;">Actualizar modelo</button>
        </div>
      </div>
    </div>

    <main style="padding:24px;">

      <!-- KPI strip -->
      <div id="pred-kpis" style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:28px;"></div>

      <!-- Radar predictivo -->
      <div style="margin-bottom:24px;">
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;">
          <svg style="width:18px;height:18px;color:#2563eb;flex-shrink:0;margin-top:1px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6.343 6.343a8 8 0 000 11.314M17.657 6.343a8 8 0 010 11.314M3.515 3.515a13 13 0 000 16.97M20.485 3.515a13 13 0 010 16.97"/></svg>
          <div>
            <p style="font-size:14px;font-weight:700;color:#0f172a;margin:0;">Radar predictivo &middot; 18 centros</p>
            <p style="font-size:11px;color:#64748b;margin:4px 0 0;line-height:1.5;max-width:760px;">Capacidades fiables con nomina + plantilla + absentismo: riesgo de ausencia, recurrencia, cronificacion, concentracion y foco emergente.</p>
          </div>
        </div>
      </div>

      <!-- Prediction list -->
      <div id="pred-list"></div>

    </main>
  </div>

  <script>
    var PREDS = [
      { centro:"Perdon",               region:"Navarra",          riesgo:82, timeframe:"proximo trimestre",
        tipoRiesgo:"Riesgo de cronificacion (bajas que se alargan)", confianza:"media",
        desc:"4 episodios superan los 60 dias: bajas que se cronifican.",
        impacto:"Si se materializa: podrian faltar <strong>3-5 personas</strong>." },
      { centro:"Bonus Pontevedra",      region:"Pontevedra",       riesgo:67, timeframe:"proximo trimestre",
        tipoRiesgo:"Riesgo de cronificacion (bajas que se alargan)", confianza:"alta",
        desc:"5 episodios superan los 60 dias: bajas que se cronifican.",
        impacto:"Si se materializa: podrian faltar <strong>3-6 personas</strong>." },
      { centro:"Murcia",               region:"Murcia",           riesgo:65, timeframe:"proximo trimestre",
        tipoRiesgo:"Reincidencia alta (patron activo)", confianza:"alta",
        desc:"Patron de reincidencia activo con 6 bajas en los ultimos 12 meses.",
        impacto:"Si se materializa: podrian faltar <strong>2-4 personas</strong>." },
      { centro:"Zona N8",              region:"Andalucia",        riesgo:63, timeframe:"proximos 6 meses",
        tipoRiesgo:"Foco emergente (concentracion de bajas)", confianza:"media",
        desc:"Concentracion de 7 bajas en el mismo turno durante 3 meses consecutivos.",
        impacto:"Si se materializa: podrian faltar <strong>1-3 personas</strong>." },
      { centro:"Terminal",             region:"Galicia",          riesgo:61, timeframe:"proximo trimestre",
        tipoRiesgo:"Riesgo de cronificacion (bajas que se alargan)", confianza:"baja",
        desc:"3 episodios superan los 45 dias. Tendencia creciente este trimestre.",
        impacto:"Si se materializa: podrian faltar <strong>2-4 personas</strong>." },
      { centro:"Falces",               region:"Navarra",          riesgo:58, timeframe:"proximo trimestre",
        tipoRiesgo:"Reincidencia alta (patron activo)", confianza:"alta",
        desc:"Recurrencia corta: 4 bajas de menos de 15 dias en 6 meses.",
        impacto:"Si se materializa: podrian faltar <strong>2-3 personas</strong>." },
      { centro:"Ingenieria Opt&Control",region:"Madrid",          riesgo:57, timeframe:"proximos 6 meses",
        tipoRiesgo:"Foco emergente (concentracion de bajas)", confianza:"media",
        desc:"Tendencia al alza en el segundo semestre. Requiere seguimiento.",
        impacto:"Si se materializa: podrian faltar <strong>1-2 personas</strong>." },
      { centro:"Codes",                region:"Aragon",           riesgo:55, timeframe:"proximo trimestre",
        tipoRiesgo:"Riesgo de cronificacion (bajas que se alargan)", confianza:"media",
        desc:"Duracion media de 38 dias por episodio. Historial de reincidencia.",
        impacto:"Si se materializa: podrian faltar <strong>2-5 personas</strong>." },
      { centro:"Made Centro",          region:"Madrid",           riesgo:53, timeframe:"proximos 6 meses",
        tipoRiesgo:"Reincidencia alta (patron activo)", confianza:"alta",
        desc:"Alta frecuencia de episodios breves: media de 2,3 dias por baja.",
        impacto:"Si se materializa: podrian faltar <strong>1-3 personas</strong>." },
      { centro:"Burgos",               region:"Castilla y Leon",  riesgo:51, timeframe:"proximos 6 meses",
        tipoRiesgo:"Foco emergente (concentracion de bajas)", confianza:"baja",
        desc:"Senal activa con baja intensidad. Vigilancia preventiva recomendada.",
        impacto:"Si se materializa: podrian faltar <strong>1-2 personas</strong>." },
      { centro:"Made Este",            region:"Cataluna",         riesgo:49, timeframe:"proximos 6 meses",
        tipoRiesgo:"Riesgo de cronificacion (bajas que se alargan)", confianza:"media",
        desc:"2 episodios proximos al umbral de 60 dias. Seguimiento mensual.",
        impacto:"Si se materializa: podrian faltar <strong>2-4 personas</strong>." },
      { centro:"Alta Tension Norte",   region:"Asturias",         riesgo:47, timeframe:"proximos 6 meses",
        tipoRiesgo:"Reincidencia alta (patron activo)", confianza:"alta",
        desc:"Episodios recurrentes sin patron claro. Supervision estandar.",
        impacto:"Si se materializa: podrian faltar <strong>1-2 personas</strong>." },
      { centro:"Sos",                  region:"Aragon",           riesgo:45, timeframe:"proximos 6 meses",
        tipoRiesgo:"Foco emergente (concentracion de bajas)", confianza:"media",
        desc:"Actividad baja. Monitorizacion activa sin intervencion inmediata.",
        impacto:"Si se materializa: podrian faltar <strong>1-3 personas</strong>." },
      { centro:"Torviscal",            region:"Extremadura",      riesgo:43, timeframe:"proximo ano",
        tipoRiesgo:"Reincidencia alta (patron activo)", confianza:"alta",
        desc:"Baja actividad del patron. Riesgo contenido bajo supervision.",
        impacto:"Si se materializa: podrian faltar <strong>1-2 personas</strong>." },
      { centro:"Guerinda",             region:"Navarra",          riesgo:41, timeframe:"proximo ano",
        tipoRiesgo:"Riesgo de cronificacion (bajas que se alargan)", confianza:"baja",
        desc:"Duracion reducida respecto al historico. Evolucion favorable.",
        impacto:"Si se materializa: podrian faltar <strong>1-3 personas</strong>." },
      { centro:"Alaiz",                region:"Navarra",          riesgo:39, timeframe:"proximo ano",
        tipoRiesgo:"Reincidencia alta (patron activo)", confianza:"media",
        desc:"Activacion marginal. Umbral de observacion preventiva.",
        impacto:"Si se materializa: podrian faltar <strong>1-2 personas</strong>." },
      { centro:"Made Oeste",           region:"Madrid",           riesgo:37, timeframe:"proximo ano",
        tipoRiesgo:"Foco emergente (concentracion de bajas)", confianza:"alta",
        desc:"Sin evidencia reciente de nueva activacion. Riesgo residual.",
        impacto:"Si se materializa: podrian faltar <strong>0-1 personas</strong>." },
      { centro:"Ingenieria Global",    region:"Madrid",           riesgo:35, timeframe:"proximo ano",
        tipoRiesgo:"Riesgo de cronificacion (bajas que se alargan)", confianza:"baja",
        desc:"Cierre de episodio previsto. Pronostico favorable para el proximo mes.",
        impacto:"Si se materializa: podrian faltar <strong>1-2 personas</strong>." }
    ];

    function badgeColor(r){
      if(r>=70) return '#f97316';
      if(r>=55) return '#f59e0b';
      if(r>=40) return '#84cc16';
      return '#22c55e';
    }

    function riesgoTagStyle(t){
      if(t.indexOf('cronificacion')!==-1)
        return 'border:1px solid #fda4af;color:#be123c;background:#fff1f2;';
      if(t.indexOf('Reincidencia')!==-1)
        return 'border:1px solid #fdba74;color:#c2410c;background:#fff7ed;';
      return 'border:1px solid #d8b4fe;color:#7c3aed;background:#faf5ff;';
    }

    function renderKpis(){
      var el=document.getElementById('pred-kpis');
      var kpis=[
        {valor:'12,8%',  label:'Absentismo pendiente',        sub:'Tasa general jun 2025',    color:'#ef4444'},
        {valor:'793.158 &#8364;', label:'Costes asociados',  sub:'Proyeccion anual',          color:'#f59e0b'},
        {valor:'7',      label:'Empleados en riesgo alto',    sub:'Score superior al 80%',    color:'#2563eb'},
        {valor:'2',      label:'Acciones criticas',           sub:'Requieren intervencion',   color:'#8b5cf6'}
      ];
      el.innerHTML=kpis.map(function(k){
        return '<div class="kpi-card">'
          +'<p style="font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;">'+k.label+'</p>'
          +'<p style="font-size:26px;font-weight:800;color:'+k.color+';line-height:1;margin:0 0 4px;">'+k.valor+'</p>'
          +'<p style="font-size:11px;color:#94a3b8;margin:0;">'+k.sub+'</p>'
          +'</div>';
      }).join('');
    }

    function renderPredList(){
      var el=document.getElementById('pred-list');
      el.innerHTML=PREDS.map(function(p,i){
        var bc=badgeColor(p.riesgo);
        var rts=riesgoTagStyle(p.tipoRiesgo);
        var confCls='conf-'+p.confianza;
        var confLbl='Confianza '+(p.confianza==='alta'?'alta':p.confianza==='media'?'media':'baja');
        return '<div class="pred-card">'
          +'<div class="pred-left">'
          +'<div class="rank-badge" style="background:'+bc+';">'+(i+1)+'</div>'
          +'<div class="pred-riesgo-num" style="color:'+bc+';">'+p.riesgo+'%</div>'
          +'<div class="pred-riesgo-lbl">probabilidad</div>'
          +'</div>'
          +'<div class="pred-mid">'
          +'<div class="pred-title-row">'
          +'<svg style="width:14px;height:14px;flex-shrink:0;color:#64748b;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6l4 2"/></svg>'
          +'<span class="pred-centro-name">'+p.centro+'</span>'
          +'<span class="tag-riesgo" style="'+rts+'">'+p.tipoRiesgo+'</span>'
          +'<span class="tag-conf '+confCls+'">'+confLbl+'</span>'
          +'</div>'
          +'<div class="pred-meta">'+p.region+' &middot; '+p.timeframe+'</div>'
          +'<div class="pred-desc">'+p.desc+'</div>'
          +'</div>'
          +'<div class="pred-right">'
          +'<div class="pred-impacto">'+p.impacto+'</div>'
          +'<button class="btn-entrar">Entrar en prediccion'
          +'<svg style="width:13px;height:13px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>'
          +'</button>'
          +'</div>'
          +'</div>';
      }).join('');
    }

    renderKpis();
    renderPredList();
  </script>

  <script src="../js/components/sidebar.js"></script>
  <script>
    if(typeof SidebarComponent!=='undefined') SidebarComponent.render();
  </script>
</body>
</html>
